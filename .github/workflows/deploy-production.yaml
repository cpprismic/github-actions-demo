name: Deploy to Production VPS

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DEPLOY" to confirm the deployment'
        required: true
        type: string

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/system-monitor

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      valid: ${{ steps.validate.outputs.valid }}
    steps:
      - name: Validate confirmation
        id: validate
        run: |
          if [[ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]]; then
            echo "Error: You must type 'DEPLOY' to confirm the deployment"
            exit 1
          fi
          echo "Validation passed"
          echo "valid=true" >> $GITHUB_OUTPUT

  check-ci-status:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
      actions: read
    outputs:
      commit: ${{ steps.get-commit.outputs.commit }}
    steps:
      - name: Get latest commit from main
        id: get-commit
        run: |
          COMMIT=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/main" \
            | jq -r '.sha')
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "Using latest main commit: $COMMIT"

      - name: Check CI status for this commit
        run: |
          COMMIT="${{ steps.get-commit.outputs.commit }}"
          echo "Checking CI status for commit: $COMMIT"

          WORKFLOW_RUNS=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/commits/$COMMIT/check-runs")

          BUILD_STATUS=$(echo "$WORKFLOW_RUNS" | jq -r '.check_runs[] | select(.name == "build") | .conclusion' | head -1)
          TEST_STATUS=$(echo "$WORKFLOW_RUNS"  | jq -r '.check_runs[] | select(.name == "test")  | .conclusion' | head -1)
          DOCKER_STATUS=$(echo "$WORKFLOW_RUNS" | jq -r '.check_runs[] | select(.name == "docker") | .conclusion' | head -1)

          echo "Build status:  $BUILD_STATUS"
          echo "Test status:   $TEST_STATUS"
          echo "Docker status: $DOCKER_STATUS"

          if [[ "$BUILD_STATUS" != "success" ]] || \
             [[ "$TEST_STATUS"  != "success" ]] || \
             [[ "$DOCKER_STATUS" != "success" ]]; then
            echo "CI checks failed! Available check runs:"
            echo "$WORKFLOW_RUNS" | jq -r '.check_runs[] | "\(.name): \(.conclusion)"'
            exit 1
          fi

          echo "All CI checks passed for commit $COMMIT"

  deploy:
    needs: [validate, check-ci-status]
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
      deployments: write

    steps:
    - name: Notify about deployment start
      run: |
        echo "PRODUCTION DEPLOYMENT STARTED"
        echo "Version: ${{ needs.check-ci-status.outputs.commit }}"
        echo "Deployed by: ${{ github.actor }}"
        echo "Time: $(date)"

    - name: Deploy to Production VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST_PROD }}
        username: ${{ secrets.VPS_USERNAME_PROD }}
        password: ${{ secrets.VPS_PASSWORD_PROD }}
        script: |
          set -e

          echo "=== PRODUCTION DEPLOYMENT ==="
          echo "Version: ${{ needs.check-ci-status.outputs.commit }}"
          echo "Deployed by: ${{ github.actor }}"

          BACKUP_DIR=~/system-monitor-backups/$(date +%Y%m%d_%H%M%S)
          mkdir -p "$BACKUP_DIR"

          mkdir -p ~/system-monitor
          cd ~/system-monitor

          if [ -f docker-compose.yml ]; then
            cp docker-compose.yml "$BACKUP_DIR/"
            echo "Configuration backed up to $BACKUP_DIR"
          fi

          echo "Downloading docker-compose.yml..."
          curl -fsSL -o docker-compose.yml \
            https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml

          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

          docker-compose down || true

          export TAG=${{ needs.check-ci-status.outputs.commit }}
          export DOCKER_IMAGE=${{ secrets.DOCKER_USERNAME }}/system-monitor
          echo "Pulling image tag: $TAG"
          docker-compose pull

          echo "Starting container..."
          docker-compose up -d

          docker image prune -f

          cat > "$BACKUP_DIR/deploy-info.txt" << EOF
          Version:    ${{ needs.check-ci-status.outputs.commit }}
          Deployed by: ${{ github.actor }}
          Date:       $(date)
          Workflow:   ${{ github.run_id }}
          EOF

          echo "=== DEPLOYMENT COMPLETE ==="

  health-check:
    needs: [check-ci-status, deploy]
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
      deployments: write
    outputs:
      status: ${{ steps.health-check-status.outputs.status }}

    steps:
    - name: Health Check
      id: health-check
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST_PROD }}
        username: ${{ secrets.VPS_USERNAME_PROD }}
        password: ${{ secrets.VPS_PASSWORD_PROD }}
        script: |
          set -e

          echo "==================================="
          echo "STARTING HEALTH CHECK"
          echo "Version: ${{ needs.check-ci-status.outputs.commit }}"
          echo "==================================="

          echo ""
          echo "1. Checking container status..."
          if docker ps | grep -q system-monitor; then
            echo "Container is running"
          else
            echo "Container is not running"
            docker ps -a | grep system-monitor || true
            exit 1
          fi

          echo ""
          echo "2. Checking uptime..."
          UPTIME=$(docker inspect --format='{{.State.StartedAt}}' system-monitor 2>/dev/null)
          START_TIME=$(date -d "$UPTIME" +%s)
          CURRENT_TIME=$(date +%s)
          RUNTIME=$((CURRENT_TIME - START_TIME))

          if [ "$RUNTIME" -gt 5 ]; then
            echo "Container has been running for $RUNTIME seconds"
          else
            echo "Container just started ($RUNTIME seconds ago), waiting..."
            sleep 5
          fi

          echo ""
          echo "3. Checking resource usage..."
          docker stats system-monitor --no-stream --format \
            "Memory: {{.MemUsage}}  CPU: {{.CPUPerc}}" 2>/dev/null || echo "Could not get stats"

          echo ""
          echo "4. Testing application process..."
          if docker exec system-monitor ps aux 2>/dev/null | grep -q "system_monitor"; then
            echo "Application process is running"
          else
            echo "Application binary check..."
            docker exec system-monitor ls -la /usr/local/bin/system_monitor 2>/dev/null || {
              echo "Application binary not found"
              exit 1
            }
          fi

          echo ""
          echo "5. Checking logs for errors..."
          ERROR_COUNT=$(docker logs --tail 50 system-monitor 2>&1 \
            | grep -iE "error|fatal|panic" | grep -iv "warn" | wc -l)
          if [ "$ERROR_COUNT" -eq 0 ]; then
            echo "No errors found in logs"
          else
            echo "Found $ERROR_COUNT potential issues:"
            docker logs --tail 20 system-monitor 2>&1 | grep -iE "error|fatal|panic" || true
          fi

          echo ""
          echo "==================================="
          echo "HEALTH CHECK PASSED"
          echo "Version: ${{ needs.check-ci-status.outputs.commit }}"
          echo "Completed: $(date)"
          echo "==================================="

    - name: Set health check status
      id: health-check-status
      run: |
        echo "status=success" >> $GITHUB_OUTPUT

  create-deployment-record:
    needs: [check-ci-status, health-check]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    if: success()

    steps:
    - name: Create GitHub Deployment
      uses: actions/github-script@v7
      with:
        script: |
          const commit = '${{ needs.check-ci-status.outputs.commit }}';

          if (!commit) {
            throw new Error('Commit hash is empty!');
          }

          console.log(`Creating deployment for commit: ${commit}`);

          await github.rest.repos.createDeployment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: commit,
            environment: 'production',
            required_contexts: [],
            auto_merge: false,
            description: `Deployed ${commit} — health check passed`
          });

    - name: Deployment success notification
      run: |
        echo "Production deployment completed successfully!"
        echo "Version: ${{ needs.check-ci-status.outputs.commit }}"
        echo "Health check: PASSED"
        echo "Deployment record created in GitHub"
