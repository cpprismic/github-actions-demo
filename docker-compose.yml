services:
  system-monitor:
    image: ${DOCKER_IMAGE:-cpprismic/system-monitor}:${TAG:-latest}
    container_name: system-monitor
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc:/host/etc:ro
    environment:
      - TZ=Europe/Moscow
    command: ["-c", "5"]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["/usr/local/bin/system_monitor"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
